<div class="container">
    <div class="form-login">
        <h1>Login</h1>
        <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="form-control">
                <input type="text" placeholder="UserName" formControlName="userName">
                <span class="tooltiptext" 
                *ngIf="form.get('userName')?.invalid && (form.get('userName')?.dirty || form.get('userName')?.touched)">
                The field username is <strong>required</strong></span>
            </div>
            <div class="form-control">
                <input type="password" placeholder="Password" formControlName="password" required="true">
                <span class="tooltiptext" 
                *ngIf="form.get('password')?.invalid && (form.get('password')?.dirty || form.get('password')?.touched)"
                >The field password is <strong>required</strong></span>
            </div>
            <div class="form-control">
                <input type="submit" value="sign in">
            </div>
        </form>
    </div>
</div>
