<div class="container">
    <div class="form-login">
        <h1 class="login-title">Login</h1>
        <form [formGroup]="form" (ngSubmit)="submit()">
            <mat-form-field appearance="standard" class="form-control">
                <mat-label>Username</mat-label>
                <input matInput formControlName="userName" required>
                <mat-error *ngIf="form.get('userName')?.invalid">Field username is <strong>requerid</strong></mat-error>
            </mat-form-field>
            <mat-form-field appearance="standard" class="form-control"> 
                <mat-label>Username</mat-label>
                <input matInput formControlName="password" required>
                <mat-error *ngIf="form.get('password')?.invalid">Field password is <strong>requerid</strong></mat-error>
            </mat-form-field>
            <div class="form-control-button">
                <button mat-button type="submit">Sign in</button>
            </div>
        </form>
    </div>
</div>
